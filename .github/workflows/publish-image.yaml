# Thanks gemini
name: Publish ARMDEVENV to GHCR

on:
  push:
    branches:
      - main
      - dev

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # This step extracts metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/armdevenv
          tags: |
            # Tag with "latest" if the branch is main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag with "dev" if the branch is dev
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            # Also tag with the commit SHA for history
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # Use the tags generated by the metadata step above
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}